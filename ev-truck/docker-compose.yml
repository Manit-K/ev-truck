services:
  postgres:
    image: postgres:16
    container_name: ev-truck-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: evtruck
      POSTGRES_USER: evtruck
      POSTGRES_PASSWORD: evtruck
    ports:
      - "5432:5432"
    volumes:
      - ev_truck_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evtruck -d evtruck"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  adminer:
    image: adminer
    container_name: ev-truck-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  ev_truck_postgres_data:
    name: ev_truck_postgres_data
